name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # -- Lint and type check (fast, runs once) --
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Type check
        run: npm run typecheck

  # -- Build and package per platform --
  build:
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # Linux: native build deps for serialport + electron
      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + electron
        run: npm run build

      # Package per platform
      - name: Package -- Linux
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux AppImage deb --publish never

      - name: Package -- Windows
        if: matrix.platform == 'win'
        run: npx electron-builder --win nsis --publish never

      - name: Package -- macOS
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac dmg --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: ardugui-${{ matrix.platform }}
          path: |
            release/*.AppImage
            release/*.deb
            release/*.exe
            release/*.dmg
          if-no-files-found: warn

  # -- Create GitHub Release on version tag --
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.exe
            artifacts/**/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
